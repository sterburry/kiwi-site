<!DOCTYPE html>
<html>
<head>
  <title>KIWIS DIARY</title>

  <style>
    body {
      margin: 0;
      color: white;
      font-family: Arial;
      display: flex;
      min-height: 100vh;

      transition: background 1.5s ease;
    }

    /* 🌙 DARK MODE (default / not listening) */
    body:not(.playing) {
      background: linear-gradient(120deg, #0f0f1a, #1a1a2e, #111);
      background-size: 400% 400%;
      animation: darkShift 20s ease infinite;
    }

    @keyframes darkShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 🌸 PASTEL MODE (when playing) */
    body.playing {
      background: linear-gradient(120deg, #a1c4fd, #c2e9fb, #fbc2eb, #a6c1ee);
      background-size: 400% 400%;
      animation: pastelShift 18s ease infinite;
    }

    @keyframes pastelShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 🌊 pulse when playing */
    body.playing::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 60%);
      animation: pulse 2.5s infinite ease-in-out;
      pointer-events: none;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.15; }
      50% { transform: scale(1.15); opacity: 0.35; }
      100% { transform: scale(1); opacity: 0.15; }
    }

    /* TOGGLE BUTTON */
    #toggleBtn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #fff;
      border: none;
      padding: 10px 12px;
      color: black;
      font-weight: bold;
      cursor: pointer;
      z-index: 1000;
      border-radius: 6px;
      transition: opacity 0.2s ease;
    }

    #toggleBtn.open {
      opacity: 0.5;
    }

    /* SIDEBAR */
    .sidebar {
      width: 200px;
      padding: 30px;
      border-right: 1px solid #222;
      position: fixed;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);

      transform: translateX(-100%);
      transition: transform 0.3s ease;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar h3 {
      margin-top: 40px;
      margin-bottom: 20px;
    }

    .sidebar a {
      display: block;
      color: white;
      opacity: 0.85;
      margin: 10px 0;
      text-decoration: none;
    }

    .sidebar a:hover {
      opacity: 1;
      color: #1DB954;
    }

    /* MAIN */
    .main {
      flex: 1;
      text-align: center;
      padding: 60px 20px;
    }

    #spotify-widget {
      margin-top: 30px;
    }

    #lyrics {
      margin-top: 20px;
      white-space: pre-wrap;
      transition: all 0.6s ease;
    }

    body.playing #lyrics {
      text-shadow: 0 0 10px rgba(255,255,255,0.6);
      transform: scale(1.01);
    }

    #youtube-link, #liked-status {
      margin-top: 20px;
    }

  </style>
</head>

<body>

<button id="toggleBtn">☰</button>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Links</h3>

  <a href="https://instagram.com/kevvv.78/" target="_blank">Instagram</a>
  <a href="https://x.com/PrivateIWIK" target="_blank">Twitter</a>
  <a href="https://github.com/sterburry" target="_blank">GitHub</a>
  <a href="https://open.spotify.com/user/31ytoif4v4wosh6gnmuclkhiyeau" target="_blank">Spotify</a>
</div>

<!-- MAIN -->
<div class="main">

  <h1>KIWI'S DIARY</h1>

  <div id="spotify-widget">Loading music...</div>

  <div id="liked-status"></div>

  <h3>YouTube</h3>
  <div id="youtube-link"></div>

  <h3>Lyrics</h3>
  <div id="lyrics">Loading lyrics...</div>

</div>

<script>
const sidebar = document.getElementById("sidebar");
const toggleBtn = document.getElementById("toggleBtn");

toggleBtn.addEventListener("click", () => {
  sidebar.classList.toggle("open");
  toggleBtn.classList.toggle("open");
});

/* LYRICS */
async function loadLyrics(artist, title) {
  try {
    const res = await fetch(
      `https://lrclib.net/api/search?q=${encodeURIComponent(artist + " " + title)}`
    );

    const data = await res.json();
    if (!data.length) return "No lyrics found.";

    return data[0].plainLyrics || "No lyrics available.";
  } catch {
    return "Error loading lyrics.";
  }
}

/* NOW PLAYING */
async function loadNowPlaying() {
  try {
    const res = await fetch("/api/now-playing");
    const data = await res.json();

    const container = document.getElementById("spotify-widget");
    const lyricsBox = document.getElementById("lyrics");

    if (!data.isPlaying) {
      document.body.classList.remove("playing");

      container.innerHTML = `
        <h3>NOT LISTENING TO ANYTHING ATM. WHICH MEANS IM EITHER DEAD OR ASLEEP :3</h3>
        <p>THEY WATCH YOU</p>
      `;

      lyricsBox.innerHTML = "";
      return;
    }

    document.body.classList.add("playing");

    container.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;justify-content:center;">
        <img src="${data.albumImage}" width="70" height="70" style="border-radius:8px;">
        <div>
          <div><b>${data.title}</b></div>
          <div>${data.artist}</div>
        </div>
      </div>
    `;

    lyricsBox.innerText = "Loading lyrics...";
    lyricsBox.innerText = await loadLyrics(data.artist, data.title);

  } catch (err) {
    document.getElementById("spotify-widget").innerHTML =
      "⚠️ Error loading Spotify data";
  }
}

loadNowPlaying();
setInterval(loadNowPlaying, 15000);
</script>

</body>
</html>
