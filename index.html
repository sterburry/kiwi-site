<!DOCTYPE html>
<html>
<head>
  <title>KIWIS DIARY</title>

  <style>
    body {
      margin: 0;
      color: white;
      font-family: Arial;
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 1.5s ease;
    }

    body:not(.playing) {
      background: linear-gradient(
        120deg,
        #0b0b14,
        #141427,
        #0f0f1a,
        #1a1a2e
      );
      background-size: 400% 400%;
      animation: darkFlow 20s ease infinite;
    }

    @keyframes darkFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes pastelFade {
      0% { background-position: 0% 50%; }
      25% { background-position: 25% 60%; }
      50% { background-position: 100% 50%; }
      75% { background-position: 75% 40%; }
      100% { background-position: 0% 50%; }
    }

    #toggleBtn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #fff;
      border: none;
      padding: 10px 12px;
      color: black;
      font-weight: bold;
      cursor: pointer;
      z-index: 1000;
      border-radius: 6px;
    }

    .sidebar {
      width: 200px;
      padding: 30px;
      border-right: 1px solid #222;
      position: fixed;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
      transform: translateX(-100%);
      transition: 0.3s;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .main {
      flex: 1;
      text-align: center;
      padding: 60px 20px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      margin: 20px;
    }

    #actions a, #actions button {
      display: inline-block;
      margin: 5px;
      padding: 10px 15px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      color: white;
    }

    .spotifyBtn { background: #1DB954; }
    .ytBtn { background: #ff0000; }

    #lyrics {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0,0,0,0.5);
      border-radius: 12px;
      max-width: 600px;
      margin: auto;
      white-space: pre-wrap;
    }

    #spotify-widget {
      margin-top: 30px;
      padding: 15px;
      background: rgba(0,0,0,0.5);
      border-radius: 12px;
    }
  </style>
</head>

<body>

<button id="toggleBtn">☰</button>

<div class="sidebar" id="sidebar">
  <h3>Links</h3>
  <a href="https://instagram.com" target="_blank">Instagram</a>
  <a href="https://x.com" target="_blank">Twitter</a>
  <a href="https://github.com" target="_blank">GitHub</a>
</div>

<div class="main">

  <h1>KIWI'S DIARY</h1>

  <div id="spotify-widget">Loading music...</div>

  <div id="actions"></div>

  <h3>Lyrics</h3>
  <div id="lyrics">Loading lyrics...</div>

</div>

<script>
const sidebar = document.getElementById("sidebar");
document.getElementById("toggleBtn").onclick = () => {
  sidebar.classList.toggle("open");
};

/* COLOR EXTRACTION */
function getColorsFromImage(img) {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = 50;
  canvas.height = 50;

  ctx.drawImage(img, 0, 0, 50, 50);

  const data = ctx.getImageData(0, 0, 50, 50).data;
  const colors = [];

  for (let i = 0; i < data.length; i += 1000) {
    colors.push(`rgb(${data[i]}, ${data[i+1]}, ${data[i+2]})`);
  }

  return colors.slice(0, 4);
}

/* LYRICS */
async function loadLyrics(artist, title) {
  const res = await fetch(`https://lrclib.net/api/search?q=${artist+" "+title}`);
  const data = await res.json();
  return data[0]?.plainLyrics || "No lyrics found.";
}

/* NOW PLAYING */
async function loadNowPlaying() {
  const res = await fetch("/api/now-playing");
  const data = await res.json();

  const container = document.getElementById("spotify-widget");
  const actions = document.getElementById("actions");
  const lyrics = document.getElementById("lyrics");

  if (!data.isPlaying) {
    document.body.classList.remove("playing");
    container.innerHTML = "Nothing playing.";
    actions.innerHTML = "";
    lyrics.innerHTML = "";
    return;
  }

  document.body.classList.add("playing");

  const img = new Image();
  img.crossOrigin = "Anonymous";
  img.src = data.albumImage;

  img.onload = () => {
    const colors = getColorsFromImage(img);

    document.body.style.background =
      `linear-gradient(120deg,
        ${colors[0]},
        ${colors[1]},
        ${colors[2]},
        ${colors[3]}
      )`;

    document.body.style.backgroundSize = "400% 400%";
    document.body.style.animation = "pastelFade 20s ease infinite";
  };

  container.innerHTML = `
    <img src="${data.albumImage}" width="80" style="border-radius:10px;">
    <div><b>${data.title}</b></div>
    <div>${data.artist}</div>
  `;

  /* ACTION BUTTONS */
  actions.innerHTML = `
    <a class="spotifyBtn" href="${data.songUrl}" target="_blank">
      Open in Spotify
    </a>

    <button class="ytBtn" id="ytLogin">
      Connect YouTube
    </button>

    <button class="ytBtn" id="ytAdd">
      ➕ Add to YouTube Playlist
    </button>
  `;

  /* YOUTUBE LOGIN */
  document.getElementById("ytLogin").onclick = () => {
    window.location.href = "/api/youtube-login";
  };

  /* ADD TO PLAYLIST */
  document.getElementById("ytAdd").onclick = async () => {
    const res = await fetch("/api/youtube-add", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        title: data.title,
        artist: data.artist
      })
    });

    const result = await res.json();
    alert(result.message || "Added!");
  };

  lyrics.innerText = "Loading lyrics...";
  lyrics.innerText = await loadLyrics(data.artist, data.title);
}

loadNowPlaying();
setInterval(loadNowPlaying, 15000);
</script>

</body>
</html>
