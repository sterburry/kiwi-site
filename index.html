<!DOCTYPE html>
<html>
<head>
  <title>KIWIS DIARY</title>

  <style>
    body {
      margin: 0;
      color: white;
      font-family: Arial;
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 1s ease;
    }

    /* 🌙 DARK MODE (not playing) */
    body:not(.playing) {
      background: linear-gradient(120deg, #0b0b14, #141427, #0f0f1a);
      background-size: 400% 400%;
      animation: darkFlow 20s ease infinite;
    }

    @keyframes darkFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 🌈 LIQUID COLOR BACKGROUND (playing) */
    body.playing::before {
      content: "";
      position: fixed;
      inset: -50%;
      z-index: -1;

      background: conic-gradient(
        from 0deg,
        #ffadad,
        #ffd6a5,
        #fdffb6,
        #caffbf,
        #9bf6ff,
        #a0c4ff,
        #bdb2ff,
        #ffc6ff,
        #ffadad
      );

      filter: blur(90px) saturate(1.4);
      animation: spin 18s linear infinite;
      opacity: 0.95;
    }

    body.playing::after {
      content: "";
      position: fixed;
      inset: -60%;
      z-index: -2;

      background: conic-gradient(
        from 180deg,
        #ff9a9e,
        #fad0c4,
        #fbc2eb,
        #a18cd1,
        #84fab0,
        #8fd3f4,
        #a6c1ee,
        #fbc2eb,
        #ff9a9e
      );

      filter: blur(130px) saturate(1.6);
      animation: spinReverse 28s linear infinite;
      opacity: 0.75;
    }

    @keyframes spin {
      from { transform: rotate(0deg) scale(1.2); }
      to   { transform: rotate(360deg) scale(1.2); }
    }

    @keyframes spinReverse {
      from { transform: rotate(360deg) scale(1.4); }
      to   { transform: rotate(0deg) scale(1.4); }
    }

    /* ☰ BUTTON */
    #toggleBtn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #fff;
      border: none;
      padding: 10px 12px;
      color: black;
      font-weight: bold;
      cursor: pointer;
      z-index: 1000;
      border-radius: 6px;
      transition: opacity 0.2s ease;
    }

    #toggleBtn.open {
      opacity: 0.5;
    }

    /* SIDEBAR */
    .sidebar {
      width: 200px;
      padding: 30px;
      border-right: 1px solid #222;
      position: fixed;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);

      transform: translateX(-100%);
      transition: transform 0.3s ease;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar h3 {
      margin-top: 40px;
      margin-bottom: 20px;
    }

    .sidebar a {
      display: block;
      color: white;
      opacity: 0.85;
      margin: 10px 0;
      text-decoration: none;
    }

    .sidebar a:hover {
      opacity: 1;
      color: #1DB954;
    }

    /* MAIN */
    .main {
      flex: 1;
      text-align: center;
      padding: 60px 20px;
    }

    #spotify-widget {
      margin-top: 30px;
    }

    #lyrics {
      margin-top: 20px;
      white-space: pre-wrap;
      transition: all 0.6s ease;
    }

    body.playing #lyrics {
      text-shadow: 0 0 10px rgba(255,255,255,0.6);
      transform: scale(1.01);
    }

    #youtube-link, #liked-status {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<button id="toggleBtn">☰</button>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Links</h3>

  <a href="https://instagram.com/kevvv.78/" target="_blank">Instagram</a>
  <a href="https://x.com/PrivateIWIK" target="_blank">Twitter</a>
  <a href="https://github.com/sterburry" target="_blank">GitHub</a>
  <a href="https://open.spotify.com/user/31ytoif4v4wosh6gnmuclkhiyeau" target="_blank">Spotify</a>
</div>

<!-- MAIN -->
<div class="main">

  <h1>KIWI'S DIARY</h1>

  <div id="spotify-widget">Loading music...</div>

  <div id="liked-status"></div>

  <h3>YouTube</h3>
  <div id="youtube-link"></div>

  <h3>Lyrics</h3>
  <div id="lyrics">Loading lyrics...</div>

</div>

<script>
const sidebar = document.getElementById("sidebar");
const toggleBtn = document.getElementById("toggleBtn");

toggleBtn.addEventListener("click", () => {
  sidebar.classList.toggle("open");
  toggleBtn.classList.toggle("open");
});

/* LYRICS */
async function loadLyrics(artist, title) {
  try {
    const res = await fetch(
      `https://lrclib.net/api/search?q=${encodeURIComponent(artist + " " + title)}`
    );

    const data = await res.json();
    if (!data.length) return "No lyrics found.";

    return data[0].plainLyrics || "No lyrics available.";
  } catch {
    return "Error loading lyrics.";
  }
}

/* NOW PLAYING */
async function loadNowPlaying() {
  try {
    const res = await fetch("/api/now-playing");
    const data = await res.json();

    const container = document.getElementById("spotify-widget");
    const lyricsBox = document.getElementById("lyrics");

    if (!data.isPlaying) {
      document.body.classList.remove("playing");

      container.innerHTML = `
        <h3>NOT LISTENING TO ANYTHING ATM. WHICH MEANS IM EITHER DEAD OR ASLEEP :3</h3>
        <p>THEY WATCH YOU. ALWAYS</p>
      `;

      lyricsBox.innerHTML = "";
      return;
    }

    document.body.classList.add("playing");

    container.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;justify-content:center;">
        <img src="${data.albumImage}" width="70" height="70" style="border-radius:8px;">
        <div>
          <div><b>${data.title}</b></div>
          <div>${data.artist}</div>
        </div>
      </div>
    `;

    lyricsBox.innerText = "Loading lyrics...";
    lyricsBox.innerText = await loadLyrics(data.artist, data.title);

  } catch (err) {
    document.getElementById("spotify-widget").innerHTML =
      "⚠️ Error loading Spotify data";
  }
}

loadNowPlaying();
setInterval(loadNowPlaying, 15000);
</script>

</body>
</html>
