<!DOCTYPE html>
<html>
<head>
  <title>KIWIS DIARY</title>

  <style>
    body {
      margin: 0;
      color: white;
      font-family: Arial;
      display: flex;
      min-height: 100vh;

      /* 🎨 animated background */
      background: radial-gradient(circle at 20% 20%, #1DB95433, transparent 40%),
                  radial-gradient(circle at 80% 30%, #ff00ff22, transparent 40%),
                  radial-gradient(circle at 50% 80%, #00ffff22, transparent 40%),
                  black;

      animation: bgMove 10s infinite alternate ease-in-out;
      transition: background 0.5s ease;
    }

    @keyframes bgMove {
      0% {
        background-position: 0% 0%;
      }
      100% {
        background-position: 100% 100%;
      }
    }

    /* 🌊 pulse layer */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(29,185,84,0.25), transparent 60%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    body.playing::before {
      opacity: 1;
      animation: pulse 1.2s infinite ease-in-out;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.2; }
      50% { transform: scale(1.2); opacity: 0.4; }
      100% { transform: scale(1); opacity: 0.2; }
    }

    /* SIDEBAR */
    .sidebar {
      width: 200px;
      padding: 30px;
      border-right: 1px solid #222;
      text-align: left;
      position: fixed;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      transform: translateX(0);
      transition: transform 0.3s ease;
    }

    .sidebar.hidden {
      transform: translateX(-100%);
    }

    .sidebar a {
      display: block;
      color: #1DB954;
      margin: 10px 0;
      text-decoration: none;
    }

    /* MAIN */
    .main {
      flex: 1;
      text-align: center;
      padding: 60px 20px;
      margin-left: 220px;
      transition: margin-left 0.3s ease;
    }

    .main.full {
      margin-left: 0;
    }

    #spotify-widget {
      margin-top: 30px;
    }

    #lyrics, #liked-status, #youtube-link {
      margin-top: 20px;
      white-space: pre-wrap;
    }

    /* TOGGLE */
    #toggleBtn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #1DB954;
      border: none;
      padding: 10px 12px;
      color: black;
      font-weight: bold;
      cursor: pointer;
      z-index: 1000;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<button id="toggleBtn">☰</button>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Links</h3>

  <a href="https://instagram.com/kevvv.78/" target="_blank">Instagram</a>
  <a href="https://x.com/PrivateIWIK" target="_blank">Twitter</a>
  <a href="https://github.com/sterburry" target="_blank">GitHub</a>
  <a href="https://open.spotify.com/user/31ytoif4v4wosh6gnmuclkhiyeau" target="_blank">Spotify</a>
</div>

<!-- MAIN -->
<div class="main" id="main">

  <h1>KIWI'S DIARY</h1>

  <div id="spotify-widget">Loading music...</div>

  <div id="liked-status"></div>

  <h3>YouTube</h3>
  <div id="youtube-link"></div>

  <h3>Lyrics</h3>
  <div id="lyrics">Loading lyrics...</div>

</div>

<script>
/* SIDEBAR */
const sidebar = document.getElementById("sidebar");
const main = document.getElementById("main");
document.getElementById("toggleBtn").addEventListener("click", () => {
  sidebar.classList.toggle("hidden");
  main.classList.toggle("full");
});

/* LYRICS */
async function loadLyrics(artist, title) {
  try {
    const res = await fetch(
      `https://lrclib.net/api/search?q=${encodeURIComponent(artist + " " + title)}`
    );

    const data = await res.json();
    if (!data.length) return "No lyrics found.";

    return data[0].plainLyrics || "No lyrics available.";
  } catch {
    return "Error loading lyrics.";
  }
}

/* NOW PLAYING */
async function loadNowPlaying() {
  try {
    const res = await fetch("/api/now-playing");
    const data = await res.json();

    const container = document.getElementById("spotify-widget");
    const lyricsBox = document.getElementById("lyrics");
    const youtubeBox = document.getElementById("youtube-link");

    /* 🎧 NOT PLAYING */
    if (!data.isPlaying) {
      document.body.classList.remove("playing");

      container.innerHTML = `
        <h3>NOT LISTENING TO ANYTHING</h3>
        <p>Kiwi is offline from Spotify</p>
      `;

      lyricsBox.innerHTML = "";
      youtubeBox.innerHTML = "";
      return;
    }

    /* 🎧 PLAYING → ACTIVATE PULSE */
    document.body.classList.add("playing");

    container.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;justify-content:center;">
        <img src="${data.albumImage}" width="70" height="70" style="border-radius:8px;">
        <div>
          <div><b>${data.title}</b></div>
          <div>${data.artist}</div>
        </div>
      </div>
    `;

    /* YOUTUBE */
    const youtubeURL =
      "https://www.youtube.com/results?search_query=" +
      encodeURIComponent(data.artist + " " + data.title);

    youtubeBox.innerHTML = `
      <a href="${youtubeURL}" target="_blank">▶ Watch on YouTube</a>
    `;

    /* LYRICS */
    lyricsBox.innerText = "Loading lyrics...";
    lyricsBox.innerText = await loadLyrics(data.artist, data.title);

  } catch (err) {
    document.getElementById("spotify-widget").innerHTML =
      "⚠️ Error loading Spotify data";
  }
}

loadNowPlaying();
setInterval(loadNowPlaying, 15000);
</script>

</body>
</html>
