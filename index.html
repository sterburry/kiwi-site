<!DOCTYPE html>
<html>
<head>
  <title>KIWI'S DIARY</title>

  <style>
    body {
      margin: 0;
      color: white;
      font-family: Arial;
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 1.5s ease;
    }

    body:not(.playing) {
      background: linear-gradient(120deg,#0b0b14,#141427,#0f0f1a,#1a1a2e);
      background-size: 400% 400%;
      animation: darkFlow 20s ease infinite;
    }

    @keyframes darkFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    #toggleBtn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #fff;
      border: none;
      padding: 10px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
      z-index: 1000;
    }

    .sidebar {
      width: 220px;
      padding: 30px 20px;
      position: fixed;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: 100;
      box-sizing: border-box;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar h3 {
      margin-top: 40px;
      margin-bottom: 16px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.5;
    }

    .nav-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      margin-bottom: 10px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .nav-card:hover {
      border-color: var(--platform-color);
      box-shadow: 0 0 12px var(--platform-color);
      background: rgba(255,255,255,0.08);
    }

    .nav-card .icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: var(--platform-color);
      flex-shrink: 0;
    }

    .nav-card .label {
      font-size: 14px;
      font-weight: bold;
    }

    .nav-card .sublabel {
      font-size: 11px;
      opacity: 0.5;
      margin-top: 2px;
    }

    .main {
      flex: 1;
      text-align: center;
      padding: 60px 20px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      margin: 20px;
      z-index: 0;
    }

    #actions button,
    #actions a {
      padding: 10px 15px;
      margin: 5px;
      border-radius: 10px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    #actions button:hover {
      background: #1DB954;
    }

    .yt-note {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.7;
    }

    #lyrics {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0,0,0,0.5);
      border-radius: 12px;
      white-space: pre-wrap;
    }

    /* 🎵 PROGRESS BAR */
    .progress-container {
      margin-top: 14px;
      width: 100%;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
    }

    .progress-times {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      opacity: 0.6;
      margin-bottom: 5px;
    }

    .progress-bar-bg {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #1DB954;
      border-radius: 4px;
      transition: width 1s linear;
    }

    /* 🕓 RECENTLY PLAYED */
    #recently-played {
      margin-top: 40px;
      text-align: left;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    #recently-played h3 {
      text-align: center;
      margin-bottom: 16px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.5;
    }

    .recent-track {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      margin-bottom: 8px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      text-decoration: none;
      color: white;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .recent-track:hover {
      background: rgba(255,255,255,0.1);
      border-color: #1DB954;
    }

    .recent-track img {
      width: 42px;
      height: 42px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .recent-track .track-info {
      flex: 1;
      overflow: hidden;
    }

    .recent-track .track-title {
      font-size: 13px;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recent-track .track-artist {
      font-size: 11px;
      opacity: 0.5;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recent-track .track-time {
      font-size: 10px;
      opacity: 0.4;
      flex-shrink: 0;
    }
  </style>
</head>

<body>

<button id="toggleBtn">☰</button>

<div class="sidebar" id="sidebar">
  <h3>Links</h3>

  <a href="https://www.instagram.com/kevvv.78/" target="_blank" class="nav-card" style="--platform-color: #E1306C;">
    <div class="icon">📸</div>
    <div>
      <div class="label">Instagram</div>
      <div class="sublabel">@kevvv.78</div>
    </div>
  </a>

  <a href="https://x.com/PrivateIWIK" target="_blank" class="nav-card" style="--platform-color: #ffffff;">
    <div class="icon">𝕏</div>
    <div>
      <div class="label">Twitter</div>
      <div class="sublabel">@privateiwik</div>
    </div>
  </a>

  <a href="https://www.twitch.tv/private_moment" target="_blank" class="nav-card" style="--platform-color: #9146FF;">
    <div class="icon">🎮</div>
    <div>
      <div class="label">Twitch</div>
      <div class="sublabel">private_moment</div>
    </div>
  </a>

  <a href="https://www.twitch.tv/sterburry" target="_blank" class="nav-card" style="--platform-color: #9146FF;">
    <div class="icon">🎮</div>
    <div>
      <div class="label">Alt</div>
      <div class="sublabel">sterburry</div>
    </div>
  </a>

  <a href="https://open.spotify.com/user/31ytoif4v4wosh6gnmuclkhiyeau" target="_blank" class="nav-card" style="--platform-color: #1DB954;">
    <div class="icon">🎵</div>
    <div>
      <div class="label">Spotify</div>
      <div class="sublabel">my music</div>
    </div>
  </a>

</div>

<div class="main">

  <h1>KIWI'S DIARY</h1>

  <div id="spotify-widget">Loading music...</div>

  <div id="actions"></div>

  <div id="recently-played">
    <h3>Recently Played</h3>
    <div id="recent-tracks">Loading...</div>
  </div>

  <h3>Lyrics</h3>
  <div id="lyrics">Loading lyrics...</div>

</div>

<script>
const sidebar = document.getElementById("sidebar");
document.getElementById("toggleBtn").onclick = () => {
  sidebar.classList.toggle("open");
};

/* ⏱ FORMAT MS TO M:SS */
function formatTime(ms) {
  const totalSeconds = Math.floor(ms / 1000);
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  return `${minutes}:${seconds.toString().padStart(2, "0")}`;
}

/* ⏰ FORMAT PLAYED AT TIME */
function formatPlayedAt(isoString) {
  const date = new Date(isoString);
  const now = new Date();
  const diffMs = now - date;
  const diffMins = Math.floor(diffMs / 60000);
  const diffHours = Math.floor(diffMins / 60);

  if (diffMins < 1) return "just now";
  if (diffMins < 60) return `${diffMins}m ago`;
  if (diffHours < 24) return `${diffHours}h ago`;
  return `${Math.floor(diffHours / 24)}d ago`;
}

/* 🎤 LYRICS */
async function loadLyrics(artist, title) {
  try {
    const res = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(artist + " " + title)}`);
    const data = await res.json();
    if (!data.length) return "No lyrics found.";
    return data[0].plainLyrics || "No lyrics available.";
  } catch {
    return "Error loading lyrics.";
  }
}

/* 🕓 RECENTLY PLAYED */
async function loadRecentlyPlayed() {
  try {
    const res = await fetch("/api/recently-played");
    const data = await res.json();
    const container = document.getElementById("recent-tracks");

    if (!data.tracks || !data.tracks.length) {
      container.innerHTML = "<p style='opacity:0.5;text-align:center;'>Nothing yet.</p>";
      return;
    }

    container.innerHTML = data.tracks.map(track => `
      <a href="${track.songUrl}" target="_blank" class="recent-track">
        <img src="${track.albumImage}" alt="${track.title}">
        <div class="track-info">
          <div class="track-title">${track.title}</div>
          <div class="track-artist">${track.artist}</div>
        </div>
        <div class="track-time">${formatPlayedAt(track.playedAt)}</div>
      </a>
    `).join("");

  } catch (err) {
    document.getElementById("recent-tracks").innerHTML = "<p style='opacity:0.5;text-align:center;'>Error loading.</p>";
  }
}

let progressInterval = null;

/* 🎧 NOW PLAYING */
async function loadNowPlaying() {
  try {
    const res = await fetch("/api/now-playing");
    const data = await res.json();

    const container = document.getElementById("spotify-widget");
    const lyricsBox = document.getElementById("lyrics");
    const actions = document.getElementById("actions");

    if (!data.isPlaying) {
      document.body.classList.remove("playing");
      container.innerHTML = "Not listening right now.";
      actions.innerHTML = "";
      lyricsBox.innerHTML = "";
      if (progressInterval) clearInterval(progressInterval);
      return;
    }

    document.body.classList.add("playing");

    const percent = (data.progress / data.duration) * 100;

    container.innerHTML = `
      <div>
        <img src="${data.albumImage}" width="70" style="border-radius:8px;">
        <div><b>${data.title}</b></div>
        <div>${data.artist}</div>

        <div class="progress-container">
          <div class="progress-times">
            <span id="currentTime">${formatTime(data.progress)}</span>
            <span>${formatTime(data.duration)}</span>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressFill" style="width: ${percent}%"></div>
          </div>
        </div>
      </div>
    `;

    if (progressInterval) clearInterval(progressInterval);
    let currentMs = data.progress;
    progressInterval = setInterval(() => {
      currentMs += 1000;
      if (currentMs > data.duration) currentMs = data.duration;
      const fill = document.getElementById("progressFill");
      const timeEl = document.getElementById("currentTime");
      if (fill) fill.style.width = `${(currentMs / data.duration) * 100}%`;
      if (timeEl) timeEl.innerText = formatTime(currentMs);
    }, 1000);

    actions.innerHTML = `
      <a href="${data.songUrl}" target="_blank">Open in Spotify</a>
      <button id="ytConnectBtn">Connect YouTube</button>
      <button id="ytAddBtn">Add to YouTube Playlist</button>
      <div id="ytStatus" class="yt-note"></div>
      <div class="yt-note">Adds songs to your private playlist "FROM KIWI :3"</div>
    `;

    const status = document.getElementById("ytStatus");

    document.getElementById("ytConnectBtn").onclick = () => {
      window.location.href = "/api/youtube-login";
    };

    document.getElementById("ytAddBtn").onclick = async () => {
      status.innerText = "⏳ Adding...";
      try {
        const res = await fetch(
          `/api/youtube-add?title=${encodeURIComponent(data.title)}&artist=${encodeURIComponent(data.artist)}`
        );
        const result = await res.json();
        console.log(result);
        if (result.status === "added") {
          status.innerText = "✅ Added to playlist!";
        } else if (result.status === "duplicate") {
          status.innerText = "⚠️ Already in playlist";
        } else {
          status.innerText = "❌ " + (result.step || result.message || "Error adding song");
        }
      } catch (err) {
        status.innerText = "❌ Failed to connect";
      }
    };

    lyricsBox.innerText = await loadLyrics(data.artist, data.title);

  } catch (err) {
    document.getElementById("spotify-widget").innerHTML = "Error loading data";
  }
}

loadNowPlaying();
loadRecentlyPlayed();
setInterval(loadNowPlaying, 15000);
setInterval(loadRecentlyPlayed, 30000);
</script>

</body>
</html>
