<!DOCTYPE html>
<html>
<head>
  <title>KIWIS DIARY</title>

  <style>
    body {
      margin: 0;
      background-color: black;
      color: white;
      font-family: Arial;
      display: flex;
      min-height: 100vh;
    }

    /* TOGGLE BUTTON */
    #toggleBtn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #1DB954;
      border: none;
      padding: 10px 12px;
      color: black;
      font-weight: bold;
      cursor: pointer;
      z-index: 1000;
      border-radius: 6px;
    }

    /* SIDEBAR */
    .sidebar {
      width: 200px;
      padding: 30px;
      border-right: 1px solid #222;
      text-align: left;
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      background: black;
      transform: translateX(0);
      transition: transform 0.3s ease;
    }

    .sidebar.hidden {
      transform: translateX(-100%);
    }

    .sidebar a {
      display: block;
      color: #1DB954;
      margin: 10px 0;
      text-decoration: none;
    }

    /* MAIN CONTENT */
    .main {
      flex: 1;
      text-align: center;
      padding: 60px 20px;
      margin-left: 220px;
      transition: margin-left 0.3s ease;
    }

    .main.full {
      margin-left: 0;
    }

    #spotify-widget {
      margin-top: 30px;
    }

    #lyrics, #liked-status, #youtube-link {
      margin-top: 20px;
      white-space: pre-wrap;
    }

  </style>
</head>

<body>

<!-- TOGGLE BUTTON -->
<button id="toggleBtn">☰</button>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Links</h3>

  <a href="https://instagram.com/kevvv.78/" target="_blank">Instagram</a>
  <a href="https://x.com/PrivateIWIK" target="_blank">Twitter</a>
  <a href="https://github.com/sterburry" target="_blank">GitHub</a>
  <a href="https://open.spotify.com/user/31ytoif4v4wosh6gnmuclkhiyeau" target="_blank">Spotify</a>
</div>

<!-- MAIN -->
<div class="main" id="main">

  <h1>KIWI'S DIARY</h1>

  <div id="spotify-widget">Loading music...</div>

  <div id="liked-status"></div>

  <h3>YouTube</h3>
  <div id="youtube-link"></div>

  <h3>Lyrics</h3>
  <div id="lyrics">Loading lyrics...</div>

</div>

<script>
/* ---------------- SIDEBAR TOGGLE ---------------- */
const sidebar = document.getElementById("sidebar");
const main = document.getElementById("main");
const toggleBtn = document.getElementById("toggleBtn");

toggleBtn.addEventListener("click", () => {
  sidebar.classList.toggle("hidden");
  main.classList.toggle("full");
});

/* ---------------- LYRICS API ---------------- */
async function loadLyrics(artist, title) {
  try {
    const res = await fetch(
      `https://lrclib.net/api/search?q=${encodeURIComponent(artist + " " + title)}`
    );

    const data = await res.json();

    if (!data.length) {
      return "No lyrics found for this song.";
    }

    return data[0].plainLyrics || "No lyrics available.";
  } catch (err) {
    return "Error loading lyrics.";
  }
}

/* ---------------- NOW PLAYING ---------------- */
async function loadNowPlaying() {
  try {
    const res = await fetch("/api/now-playing");
    const data = await res.json();

    const container = document.getElementById("spotify-widget");
    const lyricsBox = document.getElementById("lyrics");
    const likedBox = document.getElementById("liked-status");
    const youtubeBox = document.getElementById("youtube-link");

    /* NOT PLAYING */
    if (!data.isPlaying) {
      container.innerHTML = `
        <div style="padding:20px;">
          <h3>NOT LISTENING TO ANYTHING ATM. WHICH MEANS IM EITHER DEAD OR ASLEEP :3</h3>
          <p>Kiwi is currently offline from Spotify</p>
        </div>
      `;

      lyricsBox.innerHTML = "";
      likedBox.innerHTML = "";
      youtubeBox.innerHTML = "";
      return;
    }

    /* NOW PLAYING */
    container.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;justify-content:center;">
        <img src="${data.albumImage}" width="70" height="70" style="border-radius:8px;">
        <div>
          <div><b>${data.title}</b></div>
          <div>${data.artist}</div>
        </div>
      </div>
    `;

    /* YOUTUBE */
    const youtubeURL =
      "https://www.youtube.com/results?search_query=" +
      encodeURIComponent(data.artist + " " + data.title);

    youtubeBox.innerHTML = `
      <a href="${youtubeURL}" target="_blank">▶ Watch on YouTube</a>
    `;

    /* LYRICS */
    lyricsBox.innerText = "Loading lyrics...";
    const lyrics = await loadLyrics(data.artist, data.title);
    lyricsBox.innerText = lyrics;

    /* LIKED (placeholder) */
    likedBox.innerHTML = "";

  } catch (err) {
    document.getElementById("spotify-widget").innerHTML =
      "⚠️ Error loading Spotify data";
  }
}

loadNowPlaying();
setInterval(loadNowPlaying, 15000);
</script>

</body>
</html>
