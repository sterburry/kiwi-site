<!DOCTYPE html>
<html>
<head>
  <title>KIWI'S DIARY</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: white;
      font-family: Arial;
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 2s ease;
    }

    body:not(.playing) {
      background: linear-gradient(120deg,#0b0b14,#141427,#0f0f1a,#1a1a2e);
      background-size: 400% 400%;
      animation: darkFlow 20s ease infinite;
    }

    @keyframes darkFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    #toggleBtn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #fff;
      border: none;
      padding: 10px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
      z-index: 1000;
    }

    .sidebar {
      width: 220px;
      padding: 30px 20px;
      position: fixed;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: 100;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar h3 {
      margin-top: 40px;
      margin-bottom: 16px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.5;
    }

    .nav-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      margin-bottom: 10px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .nav-card:hover {
      border-color: var(--platform-color);
      box-shadow: 0 0 12px var(--platform-color);
      background: rgba(255,255,255,0.08);
    }

    .nav-card .icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: var(--platform-color);
      flex-shrink: 0;
    }

    .nav-card .label {
      font-size: 14px;
      font-weight: bold;
    }

    .nav-card .sublabel {
      font-size: 11px;
      opacity: 0.5;
      margin-top: 2px;
    }

    /* 🎨 PAGE LAYOUT */
    .page-wrap {
      display: flex;
      flex: 1;
      gap: 16px;
      padding: 20px;
      align-items: flex-start;
    }

    /* 📋 MY POSSESSIONS PANEL */
    #possessions-panel {
      display: none;
      width: 220px;
      flex-shrink: 0;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 20px 14px;
      max-height: calc(100vh - 40px);
      position: sticky;
      top: 20px;
    }

    #possessions-panel h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.4;
      text-align: center;
      margin: 0 0 14px;
    }

    #possession-tracks {
      overflow-y: auto;
      max-height: calc(100vh - 140px);
    }

    #possession-tracks::-webkit-scrollbar {
      width: 3px;
    }

    #possession-tracks::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
    }

    .possession-track {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      margin-bottom: 6px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
      position: relative;
    }

    .possession-track:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
    }

    .possession-track.confirm-remove {
      border-color: #ff4444;
      background: rgba(255,68,68,0.1);
    }

    .possession-track img {
      width: 36px;
      height: 36px;
      border-radius: 5px;
      flex-shrink: 0;
    }

    .possession-track .p-title {
      font-size: 11px;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .possession-track .remove-hint {
      font-size: 9px;
      opacity: 0.4;
      text-align: center;
      margin-top: 2px;
    }

    .possession-track .confirm-text {
      font-size: 10px;
      color: #ff4444;
      text-align: center;
      width: 100%;
    }

    .main {
      flex: 1;
      text-align: center;
      padding: 60px 20px 40px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      z-index: 0;
      min-width: 0;
    }

    #spotify-widget img {
      border-radius: 12px;
      width: 120px;
      height: 120px;
      object-fit: cover;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      margin-bottom: 12px;
    }

    #spotify-widget .song-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 4px;
    }

    #spotify-widget .song-artist {
      font-size: 14px;
      opacity: 0.6;
      margin-bottom: 12px;
    }

    .progress-container {
      margin: 12px auto 0;
      width: 100%;
      max-width: 320px;
    }

    .progress-times {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      opacity: 0.6;
      margin-bottom: 5px;
    }

    .progress-bar-bg {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: #1DB954;
      border-radius: 4px;
      transition: width 1s linear;
    }

    #actions {
      margin: 20px 0;
    }

    #actions button,
    #actions a {
      padding: 10px 15px;
      margin: 5px;
      border-radius: 10px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      font-size: 13px;
    }

    #actions button:hover {
      background: #1DB954;
    }

    .yt-note {
      margin-top: 8px;
      font-size: 12px;
      opacity: 0.7;
    }

    /* ✅ SUCCESS ANIMATION */
    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .success-pop {
      display: inline-block;
      animation: popIn 0.4s ease forwards;
    }

    /* 📐 BOTTOM GRID */
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 30px;
      text-align: left;
    }

    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.4;
      margin-bottom: 14px;
      text-align: center;
    }

    /* 🕓 RECENTLY PLAYED */
    .recent-track {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      margin-bottom: 8px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: white;
      transition: background 0.2s ease, border-color 0.2s ease;
      cursor: pointer;
      position: relative;
    }

    .recent-track:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
    }

    .recent-track img {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .recent-track .track-info {
      flex: 1;
      overflow: hidden;
    }

    .recent-track .track-title {
      font-size: 13px;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recent-track .track-artist {
      font-size: 11px;
      opacity: 0.5;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recent-track .track-time {
      font-size: 10px;
      opacity: 0.4;
      flex-shrink: 0;
    }

    /* 🎯 RECENT TRACK OVERLAY */
    .track-overlay {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }

    .recent-track.show-overlay .track-overlay {
      opacity: 1;
      pointer-events: all;
    }

    .track-overlay button {
      padding: 6px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
    }

    .track-overlay .btn-spotify {
      background: #1DB954;
      color: white;
    }

    .track-overlay .btn-yt {
      background: #FF0000;
      color: white;
    }

    .track-overlay .btn-status {
      font-size: 11px;
      color: white;
      opacity: 0.8;
    }

    /* 🎤 LYRICS */
    #lyrics {
      padding: 14px;
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.7;
      max-height: 400px;
      overflow-y: auto;
      text-align: left;
    }

    #lyrics::-webkit-scrollbar {
      width: 4px;
    }

    #lyrics::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
    }

    /* 📱 MOBILE */
    @media (max-width: 700px) {
      .page-wrap {
        flex-direction: column;
        padding: 10px;
      }

      #possessions-panel {
        width: 100%;
        position: static;
        max-height: 300px;
      }

      .bottom-grid {
        grid-template-columns: 1fr;
      }

      .main {
        padding: 50px 14px 30px;
      }
    }

    #colorCanvas {
      display: none;
    }
  </style>
</head>

<script>
const sidebar = document.getElementById("sidebar");
document.getElementById("toggleBtn").onclick = () => {
  sidebar.classList.toggle("open");
};

/* ⏱ FORMAT MS TO M:SS */
function formatTime(ms) {
  const totalSeconds = Math.floor(ms / 1000);
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  return `${minutes}:${seconds.toString().padStart(2, "0")}`;
}

/* ⏰ FORMAT PLAYED AT */
function formatPlayedAt(isoString) {
  const date = new Date(isoString);
  const now = new Date();
  const diffMs = now - date;
  const diffMins = Math.floor(diffMs / 60000);
  const diffHours = Math.floor(diffMins / 60);
  if (diffMins < 1) return "just now";
  if (diffMins < 60) return `${diffMins}m ago`;
  if (diffHours < 24) return `${diffHours}h ago`;
  return `${Math.floor(diffHours / 24)}d ago`;
}

/* 🎨 EXTRACT ALBUM COLOR */
function extractColor(imageUrl, callback) {
  const img = new Image();
  img.crossOrigin = "Anonymous";
  img.src = imageUrl;
  img.onload = () => {
    const canvas = document.getElementById("colorCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    let r = 0, g = 0, b = 0, count = 0;
    for (let i = 0; i < data.length; i += 40) {
      r += data[i];
      g += data[i + 1];
      b += data[i + 2];
      count++;
    }
    r = Math.floor((r / count) * 0.4);
    g = Math.floor((g / count) * 0.4);
    b = Math.floor((b / count) * 0.4);
    callback(r, g, b);
  };
  img.onerror = () => callback(15, 15, 30);
}

/* 🎤 LYRICS */
async function loadLyrics(artist, title) {
  try {
    const res = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(artist + " " + title)}`);
    const data = await res.json();
    if (!data.length) return "No lyrics found.";
    return data[0].plainLyrics || "No lyrics available.";
  } catch {
    return "Error loading lyrics.";
  }
}

/* 📋 ADD TO YT PLAYLIST (shared function) */
async function addToYouTube(title, artist, statusEl) {
  statusEl.innerHTML = `<span>⏳ Adding...</span>`;
  try {
    const res = await fetch(
      `/api/youtube-add?title=${encodeURIComponent(title)}&artist=${encodeURIComponent(artist)}`
    );
    const result = await res.json();
    if (result.status === "added") {
      statusEl.innerHTML = `<span class="success-pop">✅ Added!</span>`;
      loadPossessions();
    } else if (result.status === "duplicate") {
      statusEl.innerHTML = `<span>⚠️ Already in playlist</span>`;
    } else {
      statusEl.innerHTML = `<span>❌ ${result.step || result.message || "Error"}</span>`;
    }
  } catch {
    statusEl.innerHTML = `<span>❌ Failed</span>`;
  }
}

/* 🕓 RECENTLY PLAYED */
async function loadRecentlyPlayed() {
  try {
    const res = await fetch("/api/recently-played");
    const data = await res.json();
    const container = document.getElementById("recent-tracks");

    if (!data.tracks || !data.tracks.length) {
      container.innerHTML = "<p style='opacity:0.5;text-align:center;font-size:13px;'>Nothing yet.</p>";
      return;
    }

    container.innerHTML = data.tracks.map((track, i) => `
      <div class="recent-track" id="recent-${i}">
        <img src="${track.albumImage}" alt="${track.title}">
        <div class="track-info">
          <div class="track-title">${track.title}</div>
          <div class="track-artist">${track.artist}</div>
        </div>
        <div class="track-time">${formatPlayedAt(track.playedAt)}</div>
        <div class="track-overlay">
          <button class="btn-spotify" onclick="window.open('${track.songUrl}', '_blank'); event.stopPropagation();">Spotify</button>
          <button class="btn-yt" id="yt-btn-${i}" onclick="handleRecentYT(${i}, '${encodeURIComponent(track.title)}', '${encodeURIComponent(track.artist)}'); event.stopPropagation();">Add to Playlist</button>
        </div>
      </div>
    `).join("");

    // Click to toggle overlay
    data.tracks.forEach((_, i) => {
      const el = document.getElementById(`recent-${i}`);
      el.addEventListener("click", () => {
        const isOpen = el.classList.contains("show-overlay");
        document.querySelectorAll(".recent-track").forEach(t => t.classList.remove("show-overlay"));
        if (!isOpen) el.classList.add("show-overlay");
      });
    });

  } catch {
    document.getElementById("recent-tracks").innerHTML = "<p style='opacity:0.5;text-align:center;font-size:13px;'>Error loading.</p>";
  }
}

async function handleRecentYT(i, encodedTitle, encodedArtist) {
  const title = decodeURIComponent(encodedTitle);
  const artist = decodeURIComponent(encodedArtist);
  const btn = document.getElementById(`yt-btn-${i}`);
  btn.disabled = true;
  btn.innerText = "⏳";

  try {
    const res = await fetch(
      `/api/youtube-add?title=${encodedTitle}&artist=${encodedArtist}`
    );
    const result = await res.json();
    if (result.status === "added") {
      btn.innerText = "✅";
      btn.style.background = "#1DB954";
      loadPossessions();
    } else if (result.status === "duplicate") {
      btn.innerText = "⚠️ Already in";
    } else {
      btn.innerText = "❌ Error";
    }
  } catch {
    btn.innerText = "❌";
  }
}

/* 📋 MY POSSESSIONS */
async function loadPossessions() {
  try {
    const res = await fetch("/api/youtube-playlist");
    const data = await res.json();

    if (data.error === "Not connected") {
      document.getElementById("possessions-panel").style.display = "none";
      return;
    }

    document.getElementById("possessions-panel").style.display = "block";

    const container = document.getElementById("possession-tracks");

    if (!data.tracks || !data.tracks.length) {
      container.innerHTML = "<p style='opacity:0.5;text-align:center;font-size:12px;'>No songs yet.</p>";
      return;
    }

    container.innerHTML = data.tracks.map((track, i) => `
      <div class="possession-track" id="pos-${i}" onclick="handleRemove(${i}, '${track.playlistItemId}')">
        <img src="${track.thumbnail}" alt="${track.title}">
        <div style="flex:1;overflow:hidden;">
          <div class="p-title">${track.title}</div>
          <div class="remove-hint" id="pos-hint-${i}">click to remove</div>
        </div>
      </div>
    `).join("");

  } catch {
    document.getElementById("possessions-panel").style.display = "none";
  }
}

function handleRemove(i, playlistItemId) {
  const el = document.getElementById(`pos-${i}`);
  const hint = document.getElementById(`pos-hint-${i}`);

  if (!el.classList.contains("confirm-remove")) {
    el.classList.add("confirm-remove");
    hint.innerHTML = `<span style="color:#ff4444;">click again to remove</span>`;

    // Auto reset after 3 seconds if not confirmed
    setTimeout(() => {
      el.classList.remove("confirm-remove");
      hint.innerText = "click to remove";
    }, 3000);
    return;
  }

  // Second click — remove
  hint.innerText = "removing...";
  fetch(`/api/youtube-remove?playlistItemId=${playlistItemId}`)
    .then(r => r.json())
    .then(result => {
      if (result.status === "removed") {
        el.style.opacity = "0";
        el.style.transition = "opacity 0.3s ease";
        setTimeout(() => loadPossessions(), 300);
      } else {
        hint.innerText = "error removing";
      }
    })
    .catch(() => {
      hint.innerText = "error removing";
    });
}

let progressInterval = null;
let lastAlbumImage = null;

/* 🎧 NOW PLAYING */
async function loadNowPlaying() {
  try {
    const res = await fetch("/api/now-playing");
    const data = await res.json();

    const container = document.getElementById("spotify-widget");
    const lyricsBox = document.getElementById("lyrics");
    const actions = document.getElementById("actions");

    if (!data.isPlaying) {
      document.body.classList.remove("playing");
      document.body.style.background = "";
      container.innerHTML = "<p style='opacity:0.6;'>Not listening right now.</p>";
      actions.innerHTML = "";
      lyricsBox.innerHTML = "";
      if (progressInterval) clearInterval(progressInterval);
      lastAlbumImage = null;
      return;
    }

    document.body.classList.add("playing");

    if (data.albumImage !== lastAlbumImage) {
      lastAlbumImage = data.albumImage;
      extractColor(data.albumImage, (r, g, b) => {
        document.body.style.background = `linear-gradient(135deg, rgb(${r},${g},${b}), rgb(${Math.floor(r*0.6)},${Math.floor(g*0.6)},${Math.floor(b*0.6)}))`;
      });
    }

    const percent = (data.progress / data.duration) * 100;

    container.innerHTML = `
      <img src="${data.albumImage}" alt="Album art">
      <div class="song-title">${data.title}</div>
      <div class="song-artist">${data.artist}</div>
      <div class="progress-container">
        <div class="progress-times">
          <span id="currentTime">${formatTime(data.progress)}</span>
          <span>${formatTime(data.duration)}</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill" style="width: ${percent}%"></div>
        </div>
      </div>
    `;

    if (progressInterval) clearInterval(progressInterval);
    let currentMs = data.progress;
    progressInterval = setInterval(() => {
      currentMs += 1000;
      if (currentMs > data.duration) currentMs = data.duration;
      const fill = document.getElementById("progressFill");
      const timeEl = document.getElementById("currentTime");
      if (fill) fill.style.width = `${(currentMs / data.duration) * 100}%`;
      if (timeEl) timeEl.innerText = formatTime(currentMs);
    }, 1000);

    actions.innerHTML = `
      <a href="${data.songUrl}" target="_blank">Open in Spotify</a>
      <button id="ytConnectBtn">Connect YouTube</button>
      <button id="ytAddBtn">Add to YouTube Playlist</button>
      <div id="ytStatus" class="yt-note"></div>
      <div class="yt-note">Adds songs to your private playlist "FROM KIWI :3"</div>
    `;

    document.getElementById("ytConnectBtn").onclick = () => {
      window.location.href = "/api/youtube-login";
    };

    document.getElementById("ytAddBtn").onclick = async () => {
      const status = document.getElementById("ytStatus");
      await addToYouTube(data.title, data.artist, status);
    };

    lyricsBox.innerText = await loadLyrics(data.artist, data.title);

  } catch {
    document.getElementById("spotify-widget").innerHTML = "Error loading data";
  }
}

// Close overlays when clicking outside
document.addEventListener("click", (e) => {
  if (!e.target.closest(".recent-track")) {
    document.querySelectorAll(".recent-track").forEach(t => t.classList.remove("show-overlay"));
  }
});

loadNowPlaying();
loadRecentlyPlayed();
loadPossessions();
setInterval(loadNowPlaying, 15000);
setInterval(loadRecentlyPlayed, 30000);
setInterval(loadPossessions, 60000);
</script>
