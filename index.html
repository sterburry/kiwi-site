<!DOCTYPE html>
<html>
<head>
  <title>My Site</title>
  <style>
    body {
      background-color: black;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }

    a {
      color: #1DB954;
      display: block;
      margin: 10px;
      text-decoration: none;
    }

    #spotify-widget {
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <h1>My Site</h1>

  <!-- SOCIAL LINKS (add yours here) -->
  <a href="https://instagram.com">Instagram</a>
  <a href="https://twitter.com">Twitter</a>

  <!-- SPOTIFY WIDGET -->
  <div id="spotify-widget">Loading music...</div>

  <script>
  async function loadNowPlaying() {
    const res = await fetch("/api/now-playing");
    const data = await res.json();

    const container = document.getElementById("spotify-widget");

    if (!data.isPlaying) {
      container.innerHTML = "🎧 Not playing anything right now";
      return;
    }

    container.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;gap:10px;">
        <img src="${data.albumImage}" width="70" height="70" style="border-radius:8px;">
        <div>
          <div><b>${data.title}</b></div>
          <div>${data.artist}</div>
          <a href="${data.songUrl}" target="_blank">Open in Spotify</a>
        </div>
      </div>
    `;
  }

  loadNowPlaying();
  setInterval(loadNowPlaying, 10000);
  </script>

</body>
</html>
