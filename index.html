<!DOCTYPE html>
<html>
<head>
  <title>KIWIS DIARY</title>

  <style>
    body {
      margin: 0;
      color: white;
      font-family: Arial;
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 1.5s ease;
    }

    /* 🌙 DARK MODE */
    body:not(.playing) {
      background: linear-gradient(
        120deg,
        #0b0b14,
        #141427,
        #0f0f1a,
        #1a1a2e
      );
      background-size: 400% 400%;
      animation: darkFlow 20s ease infinite;
    }

    @keyframes darkFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes pastelFade {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ☰ BUTTON */
    #toggleBtn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #fff;
      border: none;
      padding: 10px 12px;
      color: black;
      font-weight: bold;
      cursor: pointer;
      z-index: 1000;
      border-radius: 6px;
    }

    #toggleBtn.open {
      opacity: 0.5;
    }

    /* SIDEBAR */
    .sidebar {
      width: 200px;
      padding: 30px;
      border-right: 1px solid #222;
      position: fixed;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar h3 {
      margin-top: 40px;
      margin-bottom: 20px;
    }

    .sidebar a {
      display: block;
      color: white;
      opacity: 0.85;
      margin: 10px 0;
      text-decoration: none;
    }

    .sidebar a:hover {
      opacity: 1;
      color: #1DB954;
    }

    /* MAIN */
    .main {
      flex: 1;
      text-align: center;
      padding: 60px 20px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      margin: 20px;
    }

    #spotify-widget {
      margin-top: 30px;
      padding: 15px;
      background: rgba(0,0,0,0.5);
      border-radius: 12px;
    }

    #actions {
      margin-top: 20px;
    }

    #actions a,
    #actions button {
      display: inline-block;
      padding: 10px 15px;
      background: rgba(0,0,0,0.6);
      border-radius: 10px;
      text-decoration: none;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.2s;
      margin: 5px;
    }

    #actions a:hover {
      background: #1DB954;
    }

    #actions button:hover {
      background: #ff0000;
    }

    .yt-note {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.7;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.4;
    }

    #lyrics {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0,0,0,0.5);
      border-radius: 12px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      white-space: pre-wrap;
    }

  </style>
</head>
<button onclick="addToYouTube('Blinding Lights', 'The Weeknd')">
  Add to YouTube Playlist
</button>

<p id="status"></p>
<body>

<button id="toggleBtn">☰</button>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Links</h3>
  <a href="https://instagram.com/kevvv.78/" target="_blank">Instagram</a>
  <a href="https://x.com/PrivateIWIK" target="_blank">Twitter</a>
  <a href="https://github.com/sterburry" target="_blank">GitHub</a>
  <a href="https://open.spotify.com/user/31ytoif4v4wosh6gnmuclkhiyeau" target="_blank">Spotify</a>
</div>

<!-- MAIN -->
<div class="main">

  <h1>KIWI'S DIARY</h1>

  <div id="spotify-widget">Loading music...</div>

  <div id="actions"></div>

  <h3>Lyrics</h3>
  <div id="lyrics">Loading lyrics...</div>

</div>

<script>
const sidebar = document.getElementById("sidebar");
const toggleBtn = document.getElementById("toggleBtn");

toggleBtn.addEventListener("click", () => {
  sidebar.classList.toggle("open");
  toggleBtn.classList.toggle("open");
});
async function addToYouTube(title, artist) {
  const status = document.getElementById("status");

  try {
    status.innerText = "⏳ Adding to YouTube...";

    const res = await fetch(
      `/api/youtube-add?title=${encodeURIComponent(title)}&artist=${encodeURIComponent(artist)}`
    );

    const data = await res.json();

    console.log("YouTube API response:", data);

    if (data.status === "added") {
      status.innerText = "✅ Added to playlist!";
    } 
    else if (data.status === "duplicate") {
      status.innerText = "⚠️ Already in playlist";
    } 
    else {
      status.innerText = "❌ " + (data.step || data.error || "Failed to add song");
    }

  } catch (err) {
    console.error(err);
    status.innerText = "❌ Request failed";
  }
}
/* 🎨 ALBUM COLORS */
function getColorsFromImage(img) {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = 50;
  canvas.height = 50;

  ctx.drawImage(img, 0, 0, 50, 50);

  const data = ctx.getImageData(0, 0, 50, 50).data;
  const colors = [];

  for (let i = 0; i < data.length; i += 1000) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];
    colors.push(`rgb(${r}, ${g}, ${b})`);
  }

  return colors.slice(0, 4);
}

/* 🎤 LYRICS */
async function loadLyrics(artist, title) {
  try {
    const res = await fetch(
      `https://lrclib.net/api/search?q=${encodeURIComponent(artist + " " + title)}`
    );
    const data = await res.json();
    if (!data.length) return "No lyrics found.";
    return data[0].plainLyrics || "No lyrics available.";
  } catch {
    return "Error loading lyrics.";
  }
}

/* 🎧 NOW PLAYING */
async function loadNowPlaying() {
  try {
    const res = await fetch("/api/now-playing");
    const data = await res.json();

    const container = document.getElementById("spotify-widget");
    const lyricsBox = document.getElementById("lyrics");
    const actions = document.getElementById("actions");

    if (!data.isPlaying) {
      document.body.classList.remove("playing");
      container.innerHTML = `
        <h3>NOT LISTENING TO ANYTHING ATM. WHICH MEANS IM EITHER DEAD OR ASLEEP :3</h3>
      `;
      lyricsBox.innerHTML = "";
      actions.innerHTML = "";
      return;
    }

    document.body.classList.add("playing");

    /* 🎨 background */
    const img = new Image();
    img.crossOrigin = "Anonymous";
    img.src = data.albumImage;

    img.onload = () => {
      const colors = getColorsFromImage(img);

      document.body.style.background = `
        linear-gradient(120deg,
          ${colors[0]},
          ${colors[1]},
          ${colors[2]},
          ${colors[3]}
        )
      `;
      document.body.style.backgroundSize = "400% 400%";
      document.body.style.animation = "pastelFade 20s ease infinite";
    };

    container.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;justify-content:center;">
        <img src="${data.albumImage}" width="70" height="70" style="border-radius:8px;">
        <div>
          <div><b>${data.title}</b></div>
          <div>${data.artist}</div>
        </div>
      </div>
    `;

    actions.innerHTML = `
  <a href="${data.songUrl}" target="_blank">
    ➕ Open in Spotify
  </a>

  <button id="ytConnectBtn">
    🎬 Connect YouTube
  </button>

  <button id="ytAddBtn">
    ➕ Add to YouTube Playlist
  </button>

  <div id="ytStatus" class="yt-note"></div>

  <div class="yt-note">
    Only adds songs to a playlist. No videos or account data are modified.
  </div>
`;
document.getElementById("ytConnectBtn").onclick = () => {
  window.location.href = "/api/youtube-login";
};

document.getElementById("ytAddBtn").onclick = async () => {
  const status = document.getElementById("ytStatus");

  status.innerText = "Adding...";

  try {
    const res = await fetch(
      `/api/youtube-add?title=${encodeURIComponent(data.title)}&artist=${encodeURIComponent(data.artist)}`
    );

    const result = await res.json();

    if (result.status === "added") {
      status.innerText = "✅ Added to playlist!";
    } else if (result.status === "duplicate") {
      status.innerText = "⚠️ Already in playlist";
    } else {
      status.innerText = "❌ " + (result.details || "Error adding song");
    }

  } catch {
    status.innerText = "❌ Failed to connect";
  }
};
    document.getElementById("ytConnectBtn").onclick = () => {
      window.location.href = "/api/youtube-login";
    };

    lyricsBox.innerText = await loadLyrics(data.artist, data.title);

  } catch (err) {
    document.getElementById("spotify-widget").innerHTML =
      "⚠️ Error loading Spotify data";
  }
}

loadNowPlaying();
setInterval(loadNowPlaying, 15000);
</script>

</body>
</html>
