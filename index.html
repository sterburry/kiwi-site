<!DOCTYPE html>
<html>
<head>
  <title>KIWI'S DIARY</title>

  <style>
    body {
      margin: 0;
      color: white;
      font-family: Arial;
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 1.5s ease;
    }

    body:not(.playing) {
      background: linear-gradient(120deg,#0b0b14,#141427,#0f0f1a,#1a1a2e);
      background-size: 400% 400%;
      animation: darkFlow 20s ease infinite;
    }

    @keyframes darkFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes pastelFade {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    #toggleBtn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #fff;
      border: none;
      padding: 10px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
      z-index: 1000;
    }

    .sidebar {
      width: 200px;
      padding: 30px;
      position: fixed;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: 100;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .main {
      flex: 1;
      text-align: center;
      padding: 60px 20px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      margin: 20px;
      z-index: 0;
    }

    #actions button,
    #actions a {
      padding: 10px 15px;
      margin: 5px;
      border-radius: 10px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }

    #actions button:hover {
      background: #1DB954;
    }

    .yt-note {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.7;
    }

    #lyrics {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0,0,0,0.5);
      border-radius: 12px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<button id="toggleBtn">☰</button>

<div class="sidebar" id="sidebar">
  <h3>Links</h3>
  <a href="https://instagram.com" target="_blank">Instagram</a>
  <a href="https://x.com" target="_blank">Twitter</a>
  <a href="https://github.com" target="_blank">GitHub</a>
  <a href="https://spotify.com" target="_blank">Spotify</a>
</div>

<div class="main">

  <h1>KIWI'S DIARY</h1>

  <div id="spotify-widget">Loading music...</div>

  <div id="actions"></div>

  <h3>Lyrics</h3>
  <div id="lyrics">Loading lyrics...</div>

</div>

<script>
const sidebar = document.getElementById("sidebar");
document.getElementById("toggleBtn").onclick = () => {
  sidebar.classList.toggle("open");
};

/* 🎤 LYRICS */
async function loadLyrics(artist, title) {
  try {
    const res = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(artist + " " + title)}`);
    const data = await res.json();
    if (!data.length) return "No lyrics found.";
    return data[0].plainLyrics || "No lyrics available.";
  } catch {
    return "Error loading lyrics.";
  }
}

/* 🎧 NOW PLAYING */
async function loadNowPlaying() {
  try {
    const res = await fetch("/api/now-playing");
    const data = await res.json();

    const container = document.getElementById("spotify-widget");
    const lyricsBox = document.getElementById("lyrics");
    const actions = document.getElementById("actions");

    if (!data.isPlaying) {
      document.body.classList.remove("playing");
      container.innerHTML = "Not listening right now.";
      actions.innerHTML = "";
      lyricsBox.innerHTML = "";
      return;
    }

    document.body.classList.add("playing");

    container.innerHTML = `
      <div>
        <img src="${data.albumImage}" width="70" style="border-radius:8px;">
        <div><b>${data.title}</b></div>
        <div>${data.artist}</div>
      </div>
    `;

    actions.innerHTML = `
      <a href="${data.songUrl}" target="_blank">Open in Spotify</a>

      <button id="ytConnectBtn">Connect YouTube</button>
      <button id="ytAddBtn">Add to YouTube Playlist</button>

      <div id="ytStatus" class="yt-note"></div>

      <div class="yt-note">
        Adds songs to your private playlist "FROM KIWI :3"
      </div>
    `;

    const status = document.getElementById("ytStatus");

    document.getElementById("ytConnectBtn").onclick = () => {
      window.location.href = "/api/youtube-login";
    };

    document.getElementById("ytAddBtn").onclick = async () => {
      status.innerText = "⏳ Adding...";

      try {
        const res = await fetch(
          `/api/youtube-add?title=${encodeURIComponent(data.title)}&artist=${encodeURIComponent(data.artist)}`
        );

        const result = await res.json();

        console.log(result);

        if (result.status === "added") {
          status.innerText = "✅ Added to playlist!";
        } else if (result.status === "duplicate") {
          status.innerText = "⚠️ Already in playlist";
        } else {
          status.innerText = "❌ " + (result.step || result.message || "Error adding song");
        }

      } catch (err) {
        status.innerText = "❌ Failed to connect";
      }
    };

    lyricsBox.innerText = await loadLyrics(data.artist, data.title);

  } catch (err) {
    document.getElementById("spotify-widget").innerHTML = "Error loading data";
  }
}

loadNowPlaying();
setInterval(loadNowPlaying, 15000);
</script>

</body>
</html>
