<!DOCTYPE html>
<html>
<head>
  <title>KIWIS DIARY</title>

  <style>
    body {
      margin: 0;
      color: white;
      font-family: Arial;
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 1.5s ease;
    }

    /* 🌙 DARK MODE (not playing) */
    body:not(.playing) {
      background: linear-gradient(
        120deg,
        #0b0b14,
        #141427,
        #0f0f1a,
        #1a1a2e
      );
      background-size: 400% 400%;
      animation: darkFlow 20s ease infinite;
    }

    @keyframes darkFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 🌈 SMOOTH PASTEL FADE (NO WHEEL) */
    body.playing {
      background: linear-gradient(
        120deg,
        #a1c4fd,
        #c2e9fb,
        #fbc2eb,
        #a6c1ee,
        #ffd6a5,
        #fdffb6,
        #caffbf,
        #9bf6ff,
        #bdb2ff,
        #ffc6ff
      );
      background-size: 800% 800%;
      animation: pastelFade 28s ease infinite;
    }

    /* 🌊 smooth drifting blend (NOT spinning) */
    @keyframes pastelFade {
      0% {
        background-position: 0% 50%;
      }
      25% {
        background-position: 25% 60%;
      }
      50% {
        background-position: 100% 50%;
      }
      75% {
        background-position: 75% 40%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    /* ☰ BUTTON */
    #toggleBtn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #fff;
      border: none;
      padding: 10px 12px;
      color: black;
      font-weight: bold;
      cursor: pointer;
      z-index: 1000;
      border-radius: 6px;
      transition: opacity 0.2s ease;
    }

    #toggleBtn.open {
      opacity: 0.5;
    }

    /* SIDEBAR */
    .sidebar {
      width: 200px;
      padding: 30px;
      border-right: 1px solid #222;
      position: fixed;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(12px);

      transform: translateX(-100%);
      transition: transform 0.3s ease;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar h3 {
      margin-top: 40px;
      margin-bottom: 20px;
    }

    .sidebar a {
      display: block;
      color: white;
      opacity: 0.85;
      margin: 10px 0;
      text-decoration: none;
    }

    .sidebar a:hover {
      opacity: 1;
      color: #1DB954;
    }

    /* MAIN */
    .main {
      flex: 1;
      text-align: center;
      padding: 60px 20px;
    }

    #spotify-widget {
      margin-top: 30px;
    }

    #lyrics {
      margin-top: 20px;
      white-space: pre-wrap;
      transition: all 0.6s ease;
    }

    body.playing #lyrics {
      text-shadow: 0 0 10px rgba(255,255,255,0.6);
      transform: scale(1.01);
    }

    #youtube-link, #liked-status {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<button id="toggleBtn">☰</button>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Links</h3>

  <a href="https://instagram.com/kevvv.78/" target="_blank">Instagram</a>
  <a href="https://x.com/PrivateIWIK" target="_blank">Twitter</a>
  <a href="https://github.com/sterburry" target="_blank">GitHub</a>
  <a href="https://open.spotify.com/user/31ytoif4v4wosh6gnmuclkhiyeau" target="_blank">Spotify</a>
</div>

<!-- MAIN -->
<div class="main">

  <h1>KIWI'S DIARY</h1>

  <div id="spotify-widget">Loading music...</div>

  <div id="liked-status"></div>

  <h3>YouTube</h3>
  <div id="youtube-link"></div>

  <h3>Lyrics</h3>
  <div id="lyrics">Loading lyrics...</div>

</div>

<script>
const sidebar = document.getElementById("sidebar");
const toggleBtn = document.getElementById("toggleBtn");

toggleBtn.addEventListener("click", () => {
  sidebar.classList.toggle("open");
  toggleBtn.classList.toggle("open");
});

/* 🎨 GENRE COLOR SYSTEM */
function getGenreColors(genres) {
  const g = (genres || []).join(" ").toLowerCase();

  if (g.includes("rap") || g.includes("trap") || g.includes("hip hop")) {
    return ["#0f0f1a", "#1a1a2e", "#16213e", "#533483"];
  }

  if (g.includes("rock") || g.includes("metal")) {
    return ["#2b0000", "#660000", "#990000", "#ff1a1a"];
  }

  if (g.includes("pop")) {
    return ["#ffd6e0", "#ffc2d1", "#ffe5ec", "#fff0f3"];
  }

  if (g.includes("indie") || g.includes("alternative")) {
    return ["#2c3e50", "#4ca1af", "#6dd5ed", "#cfd9df"];
  }

  if (g.includes("edm") || g.includes("dance") || g.includes("electronic")) {
    return ["#00c6ff", "#0072ff", "#00f260", "#0575e6"];
  }

  // fallback (pastel)
  return ["#a1c4fd", "#c2e9fb", "#fbc2eb", "#a6c1ee"];
}

/* LYRICS */
async function loadLyrics(artist, title) {
  try {
    const res = await fetch(
      `https://lrclib.net/api/search?q=${encodeURIComponent(artist + " " + title)}`
    );

    const data = await res.json();
    if (!data.length) return "No lyrics found.";

    return data[0].plainLyrics || "No lyrics available.";
  } catch {
    return "Error loading lyrics.";
  }
}

/* NOW PLAYING */
async function loadNowPlaying() {
  try {
    const res = await fetch("/api/now-playing");
    const data = await res.json();

    const container = document.getElementById("spotify-widget");
    const lyricsBox = document.getElementById("lyrics");

    if (!data.isPlaying) {
      document.body.classList.remove("playing");

      container.innerHTML = `
        <h3>NOT LISTENING TO ANYTHING ATM. WHICH MEANS IM EITHER DEAD OR ASLEEP :3</h3>
        <p>THEY WATCH YOU. ALWAYS</p>
      `;

      lyricsBox.innerHTML = "";
      return;
    }

    document.body.classList.add("playing");

    /* 🎨 APPLY GENRE COLORS */
    const colors = getGenreColors(data.genres);

    document.body.style.background = `
      linear-gradient(120deg,
        ${colors[0]},
        ${colors[1]},
        ${colors[2]},
        ${colors[3]}
      )
    `;
    document.body.style.backgroundSize = "400% 400%";
    document.body.style.animation = "pastelFade 20s ease infinite";

    container.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;justify-content:center;">
        <img src="${data.albumImage}" width="70" height="70" style="border-radius:8px;">
        <div>
          <div><b>${data.title}</b></div>
          <div>${data.artist}</div>
        </div>
      </div>
    `;

    lyricsBox.innerText = "Loading lyrics...";
    lyricsBox.innerText = await loadLyrics(data.artist, data.title);

  } catch (err) {
    document.getElementById("spotify-widget").innerHTML =
      "⚠️ Error loading Spotify data";
  }
}

loadNowPlaying();
setInterval(loadNowPlaying, 15000);
</script>

</body>
</html>
