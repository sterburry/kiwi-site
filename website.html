<!DOCTYPE html>
<html>
<head>
  <title>My Site</title>
  <style>
    body {
      background-color: black;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }
    a {
      color: #1DB954;
      display: block;
      margin: 10px;
      text-decoration: none;
    }
  </style>
</head>
<script>
async function getNowPlaying() {
  const response = await fetch("https://your-backend-url.com/now-playing");
  const data = await response.json();

  const songElement = document.getElementById("song");

  if (data.isPlaying) {
    songElement.innerText = `🎧 ${data.artist} – ${data.song}`;
  } else {
    songElement.innerText = "Nothing playing right now";
  }
}

getNowPlaying();
setInterval(getNowPlaying, 10000);
</script>
<body>

  <h1>kiwi 🥝</h1>

  <p id="song">🎧 Loading...</p>

  <div>
    <a href="#">Instagram</a>
    <a href="#">YouTube</a>
    <a href="#">My Projects</a>
  </div>

</body>
</html>
